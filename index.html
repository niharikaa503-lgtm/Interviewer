const CASES = [
  {id:1,title:"Credit Card Over-Limit Transaction",type:"financial",tags:["Financial","Credit Risk","Quantitative"],prompt:"A customer wants to make a $300 transaction that would push their balance to $5,100 against a $5,000 limit. APR 15%, cost of funds 3%, interchange fee 1.5%, default rate 2%. Customer repays $100/month for 3 months. Should you approve?",framework:"Revenue–Cost analysis. Revenue = (Net APR × monthly balance × non-default %) + interchange. Cost = $300 × default rate. Find break-even default rate.",answer:"Revenue = 98%×(300×1%+200×1%+100×1%) + 1.5%×$300 = $10.38. Cost = $300×2% = $6. Profit = $4.38 → Approve. At 7% default: loss = $10.92 → Don't approve. Break-even default rate ≈ 3.4%.",followups:["Why would losses appear even with positive EV? (Real default rate > modeled rate)","At 7% default rate, should we approve? (No — loss of $10.92)","What default rate causes break-even? (~3.4%)","Draw the graph: default rate (X) vs profit (Y)"]},
  {id:2,title:"Sunrise Breakfast — Declining Sales",type:"strategy",tags:["Strategy","P&L","Market Analysis"],prompt:"National breakfast chain, 1,000 stores, publicly traded. Industry sales are growing but Sunrise's sales are declining. You're the new VP of Strategy. Hypotheses + annual profit calculation.",framework:"Hypotheses: competition / customer taste change / location shift / distribution model. P&L: Revenue = transactions × price × stores × 12. Cost = utility + overhead + COGS per transaction.",answer:"Profit = $218M. Revenue = 16,000×$10×12×1,000 = $1.92B. Cost = $50M + $500K×1,000 + 16,000×$6×12×1,000 = $1.702B. To breakeven at $8 price → need 32,000 txns/store/month (2×).",followups:["What data would help identify root cause?","Competitor charges $8 — how many transactions to maintain profit?","Should we add drive-throughs at $100M cost? How many occasional→loyal shifts needed?","Drive-through vs. price reduction — which is better?"]},
  {id:3,title:"Adventure Land Amusement Park",type:"financial",tags:["Financial","Strategy","Probability / EV"],prompt:"Adventure Land: 2,000 acres, 1M visitor-days/season. Three ticket types: 1-day $80 (250K sold), 5-day $300 (100K sold), Season Pass $1,000 (10K sold). Calculate total revenue + profit, then evaluate a land acquisition opportunity with probability scenarios.",framework:"Revenue = sum of all ticket types + F&B + Lodging. Costs = L&M ($25K/acre) + COGS + GA + Land owner fees (5% TPR) + Lodging. Then EV analysis for the acquisition.",answer:"Park Pass Rev = $60M. Total Rev = $120M. Profit = $15M. New 1,000 acres: Profit = $25M. Bid scenario (80% success at 5% fee vs. 20% competitor gets it → −$2M): EV = $25.6M > $25M certainty. Recommendation: Decline 10% offer and bid.",followups:["On average, how many days did season pass holders visit? (25 days)","Accept 10% fee or bid? (EV analysis)","If competitor gets it, revenue drops 20%. Change recommendation?"]},
  {id:4,title:"Venmo-Style Payment App",type:"financial",tags:["Financial","Fintech","Break-Even"],prompt:"Digital payment app. Credit card: 20% of volume, 1.25% VC, 3% revenue. Debit: 80%, 0.25% VC, 0% revenue. Total transfers = $1B/year, 5M customers, FC = $3.5M. Profitable? How many customers to break-even?",framework:"Separate credit vs debit economics. Revenue = total volume × credit% × revenue rate. Cost = VC for each type + FC. Set profit = 0 for break-even customers.",answer:"Profit = $6M−$2.5M−$2M−$3.5M = −$2M (loss). Break-even = 11.67M customers. Partnership route: 4 partners with ~$240M annual sales, 2.5% revenue share.",followups:["Why is the business losing money?","How many customers to break-even? (11.67M)","How many partners at $240M sales to break-even? (4)","Should you take this partner? What factors matter?"]},
  {id:5,title:"Mobile Check Deposit Feature",type:"product",tags:["Product","Build vs. Stay","Cost Savings"],prompt:"Capital One is evaluating mobile check deposit (6-7 years ago). Branch processing: $0.31/check. Mobile: $0.60/check but no teller + $5M build cost. 1,000 branches, 250,000 checks/branch/year. Should they build it?",framework:"Compare total cost of branch vs. mobile. Mobile has higher per-check cost due to error rate, but eliminates teller cost. Add fraud risk analysis.",answer:"Branch total ≈ $78.5M/year. Mobile costs higher per-check short-term but saves long-term. Key risk = fraud (same check deposited at multiple banks). At 0.01% fraud rate, 40% recovery: mobile is still cheaper per check long-term.",followups:["What fraud risks exist? (Same check deposited at multiple banks)","How would you control fraud? (ML model + pending period)","If fraud rate is 0.01%, recovery 40% — per-check processing cost?","3 ways to improve profit from mobile deposit?"]},
  {id:6,title:"Credit Card Rewards Program Launch",type:"financial",tags:["Financial","Rewards","A/B Test"],prompt:"Test vs. control: Control (no cashback) spends $200/month avg. Test (1% cashback) spends $300/month avg. Interchange fee 1.5%. Should you launch? What if control group has $1,000 avg balance at 6% APR?",framework:"Compare net revenue per customer: Control = $200 × 1.5%. Test = $300 × 1.5% − $300 × 1% (cashback). Add interest income from revolving balances.",answer:"Control: $3. Test: $1.50. Without interest: Don't launch (cost > benefit). With $1,000 balance at 6% APR: test group balance needs to be ≥$1,300 to justify the program.",followups:["Should you launch based on spend alone? (No — $1.50 < $3)","What balance does the test group need to break-even? (~$1,300)","What revenue sources from credit cards are you not capturing?","How would you design the A/B test for statistical validity?"]},
  {id:7,title:"Winery Competitive Threat",type:"strategy",tags:["Strategy","Competitor Analysis","P&L"],prompt:"You run a wine reseller with $2M revenue. Gross margin 30%. Fixed costs $510K. A large national chain enters with 25,000 sq ft, 18% sales growth, and prices ~10% lower than yours. What do you do?",framework:"Calculate your profit first. Compare cost structures. Identify which customer segments would defect. Develop segment-specific retention strategies.",answer:"Your profit: $2M − $1.4M VC − $510K FC = $90K (thin). Competitor's COGS = 72.9% → prices ~10% lower. Discount hunters will switch. Focus: service-oriented + selection hounds (higher LTV). Strategies: specialty selections, service quality, loyalty program.",followups:["Calculate your current profit margin","Why does the competitor price lower? (Lower COGS structure)","Which customer segments will you lose first?","2-3 strategies to retain your customer base?"]},
  {id:8,title:"Capital One Mobile App Review",type:"product",tags:["Product Design","Product Sense","Mini-Case"],prompt:"The interviewer shows you the Capital One Mobile App. Walk through: What do you like? What don't you like? What are competitors doing that C1 isn't? What's your #1 recommendation to the PM?",framework:"CIRCLES or structured product review: Users → Jobs-to-be-done → Competitive gaps → Prioritized recommendation with rationale. Be specific — reference actual features.",answer:"Strong: virtual card numbers, Eno, clean UI. Gaps: no GenAI financial coaching, weak rewards discovery, no proactive savings nudges. Competitors better: Chime (spending insights), Erica/BofA (proactive alerts). Recommendation: Build an AI financial coach layer on Eno.",followups:["What specifically do you like about the app?","What's the biggest UX friction point?","What are Chase and BofA doing that C1 should be doing?","If you had 1 engineer for 6 months, what would you build?"]},

async function callClaude(messages, system) {
  const key = window._apiKey || localStorage.getItem('c1_api_key') || '';
  if (!key) throw new Error("No API key set. Please enter your Anthropic API key in the field at the top of the page.");
  const payload = JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages});
  const directHeaders = {
    "Content-Type":"application/json",
    "x-api-key": key,
    "anthropic-version":"2023-06-01",
    "anthropic-dangerous-direct-browser-access":"true"
  };
  let res;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", {method:"POST", headers:directHeaders, body:payload});
  } catch(e) {
    const proxyHeaders = {"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    res = await fetch("https://corsproxy.io/?url=https://api.anthropic.com/v1/messages", {method:"POST", headers:proxyHeaders, body:payload});
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b=>b.text||"").join("");
}

}

function renderScorecard(s) {
  const dims=[{n:'Structure & Framework',v:s.structure,c:'#CC0000'},{n:'Strategic Thinking',v:s.strategy,c:'#C9A84C'},{n:'Data & Metrics',v:s.data,c:'#27AE60'},{n:'Customer Focus',v:s.customer,c:'#2E86C1'},{n:'Recommendation',v:s.recommendation,c:'#8E44AD'}];
  return `<div class="scorecard"><h3>📋 Interview Scorecard</h3>
    ${dims.map(d=>`<div class="sc-row"><div class="sc-label">${d.n}</div><div class="sc-bar"><div class="sc-fill" style="width:${d.v}%;background:${d.c}"></div></div><div class="sc-num">${d.v}%</div></div>`).join('')}
    <div class="divider"></div>
    <p style="font-size:13px;color:var(--muted);line-height:1.65">${s.feedback}</p>
  </div>`;
}

// ── PREP HUB ──
function renderPrep(section) {
  if (['frameworks','math','glossary','insider','products','questions'].includes(section)) prepTab=section;
  return `<div class="prep-wrap">
    <h2>Prep & Study Hub</h2>
    <p class="prep-sub">22 frameworks (PM + your BA flashcards), math quick-reference, insider tips, product knowledge, and common questions with coaching.</p>
    <div class="prep-tabs">
      ${['frameworks','math','glossary','insider','products','questions'].map(t=>`<button class="ptab ${prepTab===t?'active':''}" onclick="setPrepTab('${t}')">${{frameworks:'Frameworks',math:'Math Reference',glossary:'Banking Glossary',insider:'Insider Tips',products:'Product Knowledge',questions:'Common Questions'}[t]}</button>`).join('')}
    </div>
    ${renderPrepContent()}
  </div>`;
}

function renderPrepContent() {
  if (prepTab==='frameworks') {
    const badges = [{id:'all',l:'All'},{id:'pd',l:'Product Design'},{id:'st',l:'Strategy'},{id:'me',l:'Metrics'},{id:'pr',l:'Prioritization'},{id:'fi',l:'Financial'},{id:'co',l:'Competitor'},{id:'ri',l:'Risk'},{id:'ca',l:'C1-Specific'}];
    const filtered = fwFilter==='all'?FRAMEWORKS:FRAMEWORKS.filter(f=>f.bc===fwFilter);
    return `<div class="fw-filters">${badges.map(b=>`<button class="fwf ${fwFilter===b.id?'active':''}" onclick="setFWFilter('${b.id}')">${b.l}</button>`).join('')}</div>
    ${filtered.map(f=>`
      <div class="fw-card ${expandedFW===f.name?'expanded':''}" onclick="toggleFW('${f.name.replace(/'/g,"\\'")}')">
        <div class="fw-head">
          <div class="fw-title-block"><div class="fw-name">${f.name}</div><div class="fw-use">${f.when}</div></div>
          <span class="fw-badge ${f.bc}">${f.badge}</span>
          <span class="fw-expand">›</span>
        </div>
        <div class="fw-body">
          <div class="fw-steps">${f.steps.map((s,i)=>`<span class="fw-step">${i>0?'→ ':''} ${s}</span>`).join('')}</div>
          <p class="fw-desc">${f.desc}</p>
        </div>
      </div>`).join('')}`;
  }

  if (prepTab==='math') {
    return `<p style="font-size:13px;color:var(--muted);margin-bottom:20px">Your flashcard frameworks + formulas — all transcribed and organized for quick reference during mental math and financial case prep.</p>
    <div class="math-grid">${MATH_CARDS.map(c=>`
      <div class="math-card">
        <h4 style="color:${c.color}">${c.title}</h4>
        ${c.rows.map(r=>`<div class="math-row"><span class="math-label">${r.l}</span><span class="math-formula">${r.f}</span></div>`).join('')}
      </div>`).join('')}</div>`;
  }

  if (prepTab==='insider') return INSIDER_TIPS.map(t=>`
    <div class="tip-card"><div class="tip-icon">${t.icon}</div>
      <div><div class="tip-src">${t.src}</div><div class="tip-text">${t.text}</div></div>
    </div>`).join('');

  if (prepTab==='products') return `<div class="pk-grid">${Object.entries(PRODUCTS).map(([n,p])=>`
    <div class="pk-card">
      <h4>${p.icon} ${n}</h4><div class="pk-type">PRODUCT KNOWLEDGE</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">${p.tagline}</p>
      <p style="font-size:11px;color:var(--dim);margin-bottom:5px">STRENGTHS</p><ul>${p.strengths.map(s=>`<li>${s}</li>`).join('')}</ul>
      <p style="font-size:11px;color:var(--dim);margin:8px 0 5px">COMPETITORS</p><ul>${p.competitors.map(c=>`<li>${c}</li>`).join('')}</ul>
      <p style="font-size:11px;color:var(--dim);margin:8px 0 5px">KEY METRICS</p><ul>${p.metrics.slice(0,4).map(m=>`<li>${m}</li>`).join('')}</ul>
      <p style="font-size:11px;color:var(--dim);margin:8px 0 5px">OPPORTUNITIES</p><ul>${p.opportunities.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>`).join('')}</div>`;

  if (prepTab==='glossary') {
    const cats = [
      {id:'all',l:'All Terms'},
      {id:'credit',l:'Credit Card'},
      {id:'risk',l:'Risk & Collections'},
      {id:'fraud',l:'Fraud'},
      {id:'metrics',l:'Key Metrics'},
      {id:'product',l:'Product Features'},
      {id:'shopping',l:'Shopping'},
      {id:'banking',l:'Banking'},
      {id:'strategy',l:'Strategy'},
    ];
    const filtered = GLOSSARY.filter(g => {
      const catOk = glFilter==='all' || g.cat===glFilter;
      const q = glSearch.toLowerCase();
      const searchOk = !q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q) || g.why.toLowerCase().includes(q);
      return catOk && searchOk;
    });
    return `
      <input class="gl-search" id="glSearchInput" placeholder="Search terms, definitions..." value="${glSearch}" oninput="setGlSearch(this.value)">
      <div class="gl-cats">${cats.map(c=>`<button class="gl-cat ${glFilter===c.id?'active':''}" onclick="setGlFilter('${c.id}')">${c.l}</button>`).join('')}</div>
      <div class="gl-count">${filtered.length} term${filtered.length!==1?'s':''} ${glFilter!=='all'?'in this category':'total'}</div>
      <div class="gl-grid">${filtered.map(g=>`
        <div class="gl-card">
          <div class="gl-term">${g.term} <span class="gl-tag ${g.cat}">${g.tag}</span></div>
          <div class="gl-def">${g.def}</div>
          <div class="gl-why"><strong>▸ C1 PM context:</strong> ${g.why}</div>
        </div>`).join('')}
      </div>`;
  }
  if (prepTab==='questions') return COMMON_QUESTIONS.map(q=>`
    <div class="qcard">
      <div class="qt ${q.tc}">${q.type}</div>
      <div class="qtext">${q.q}</div>
      <div class="qtip"><strong>💡 How to approach:</strong> ${q.tip}</div>
    </div>`).join('');
  return '';
}

// ── PITCH ──
function renderPitch(section) {
  const idx = parseInt(section.replace('p',''))||0;
  if (pitchState.idx!==idx) pitchState={idx,messages:[],loading:false,feedback:null};
  const prompt = PITCH_PROMPTS[idx];
  return `<div class="pitch-wrap">
    <div class="pitch-head"><h2>🎯 Pitch Trainer</h2>
      <p>Deliver your answer. AI scores structure, strategic depth, customer focus, and conviction.</p></div>
    <div class="pitch-body" id="pitchmsgs">
      <div class="pitch-prompt">
        <div class="pp-lbl">YOUR PROMPT · ${prompt.type.toUpperCase()}</div>
        <div class="pp-txt">${prompt.q}</div>
      </div>
      ${pitchState.messages.map(renderMsg).join('')}
      ${pitchState.loading?`<div class="msg ai"><div class="msg-av">AI</div><div class="msg-bub"><div class="typing"><span></span><span></span><span></span></div></div></div>`:''}
      ${!pitchState.loading?`
        <div style="background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
          <textarea class="chat-ta" id="pitch-input" placeholder="Deliver your pitch here — structured, confident, specific..." rows="6" style="width:100%;border:none;background:transparent;margin-bottom:12px"></textarea>
          <div style="display:flex;gap:8px">
            <button class="btn-primary" onclick="submitPitch()">Submit for Feedback</button>
            <button class="btn-ghost" onclick="resetPitch()">Reset</button>
          </div>
        </div>`:''}
      ${pitchState.feedback?renderPitchFeedback(pitchState.feedback):''}
    </div>
  </div>`;
}

function renderPitchFeedback(fb) {
  const dims=[{n:'Structure',v:fb.structure,f:fb.structure_fb},{n:'Strategic Depth',v:fb.strategy,f:fb.strategy_fb},{n:'Customer Focus',v:fb.customer,f:fb.customer_fb},{n:'Clarity & Conviction',v:fb.clarity,f:fb.clarity_fb}];
  const gc=s=>s>=80?'#27AE60':s>=60?'#E67E22':'#CC0000';
  const gl=s=>s>=80?'Strong':s>=60?'Developing':'Needs Work';
  return `<div class="fb-section"><h3>📋 Pitch Feedback</h3>
    ${dims.map(d=>`<div class="dim-row">
      <div class="dim-sc" style="background:${gc(d.v)}22;color:${gc(d.v)}">${d.v}</div>
      <div><div class="dim-name">${d.n} <span style="font-size:11px;font-family:'DM Mono',monospace;color:${gc(d.v)}">${gl(d.v)}</span></div><div class="dim-fb">${d.f}</div></div>
    </div>`).join('')}
    <div class="divider"></div>
    <p style="font-size:13px;line-height:1.65;color:var(--muted)">${fb.overall}</p>
    ${fb.improved_pitch?`<div class="divider"></div>
      <p style="font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;margin-bottom:8px;letter-spacing:1px">SUGGESTED STRONGER OPENING</p>
      <div style="background:rgba(204,0,0,.08);border-left:3px solid var(--red);padding:12px 16px;border-radius:0 8px 8px 0;font-size:13px;color:var(--muted);line-height:1.65">${fb.improved_pitch}</div>`:''}
  </div>`;
}

// ── CASES ──
function renderCases(filter) {
  const filtered = filter==='all'?CASES:CASES.filter(c=>c.type===filter);
  return `<div class="case-wrap">
    <h2>Case Library</h2>
    <p class="prep-sub" style="margin-bottom:18px">10 real cases from your uploaded documents + C1 product cases. Full prompts, frameworks, model answers, follow-up questions.</p>
    ${filtered.map(c=>`
      <div class="ccase ${expandedCase===c.id?'expanded':''}" id="ccase-${c.id}" onclick="toggleCase(${c.id})">
        <div class="cc-head">
          <div style="flex:1">
            <div class="cc-meta">${c.tags.map(t=>`<span class="cc-tag ${c.type}">${t}</span>`).join('')}</div>
            <div class="cc-title">${c.title}</div>
            <div class="cc-prompt">${c.prompt}</div>
          </div>
          <span class="cc-exp">›</span>
        </div>
        <div class="cc-body">
          <div class="cc-sl">Recommended Framework</div>
          <div class="cc-st" style="margin-bottom:14px">${c.framework}</div>
          <div class="cc-sl">Model Answer</div>
          <div class="ans-box"><p>${c.answer}</p></div>
          <div class="cc-sl" style="margin-top:14px">Follow-Up Questions to Expect</div>
          <ul style="padding-left:18px">${c.followups.map(f=>`<li style="font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.5">${f}</li>`).join('')}</ul>
        </div>
      </div>`).join('')}
  </div>`;
}

// ═══════════════════════ ACTIONS ═══════════════════════
window.selectMode = m => { appState={mode:m,section:null}; mockState={product:null,messages:[],loading:false,score:null}; pitchState={idx:0,messages:[],loading:false,feedback:null}; render(); };
window.goHome = () => { appState={mode:null,section:null}; render(); };
window.setSection = s => { appState.section=s; if(appState.mode==='mock')mockState={product:s,messages:[],loading:false,score:null}; render(); };
window.setPrepTab = t => { prepTab=t; render(); };
window.setGlFilter = f => { glFilter=f; render(); setTimeout(()=>{const el=document.getElementById('glSearchInput');if(el)el.focus();},50); };
window.setGlSearch = v => { glSearch=v; render(); setTimeout(()=>{const el=document.getElementById('glSearchInput');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},10); };
window.setFWFilter = f => { fwFilter=f; expandedFW=null; render(); };
window.toggleFW = n => { expandedFW = expandedFW===n?null:n; render(); };
window.toggleCase = id => { expandedCase=expandedCase===id?null:id; render(); setTimeout(()=>{const el=document.getElementById(`ccase-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50); };

window.startMock = async (product) => {
  const pd = PRODUCTS[product]||PRODUCTS["Mobile App"];
  const cp = MOCK_CASES[product];
  const system = `You are a senior Capital One product management interviewer conducting a Director-level PM mini-case interview. Tone: neutral, professional, methodical.

PRODUCT CONTEXT: ${product} — ${pd.description}
Competitors: ${pd.competitors.join(', ')}. Key metrics: ${pd.metrics.join(', ')}.

CASE PROMPT: "${cp}"

YOUR APPROACH:
1. Introduce yourself briefly and present the case clearly
2. After candidate shares framework, ask ONE focused follow-up at a time
3. Cover across conversation: hypothesis/framework, competitor context, metrics, strategic recommendation, trade-offs, implementation
4. After 6-8 exchanges, say "Let me provide final feedback now" then close
5. Keep each message to 2-4 sentences — this is dialogue, not lecture
6. Do NOT give away answers — probe, challenge, redirect
7. Push: "How would you measure success here?" if they skip metrics
8. Push: "Can you be more specific?" if vague
9. At Director level: push for business impact, not just product features

When wrapping up: provide structured feedback, then end with SCORE_JSON:{"structure":X,"strategy":X,"data":X,"customer":X,"recommendation":X,"feedback":"2-3 sentence overall assessment"}

Format: Use <strong> for key terms. Keep it conversational.`;

  mockState = {product, messages:[], loading:true, score:null};
  render();
  try {
    const reply = await callClaude([{role:'user',content:'Begin the interview.'}], system);
    mockState.messages.push({role:'ai',content:reply});
    mockState.loading=false; render();
  } catch(e) {
    mockState.messages.push({role:'ai',content:`<strong>Connection error.</strong> ${e.message}`});
    mockState.loading=false; render();
  }
};

window.sendMock = async () => {
  const inp = document.getElementById('mock-input');
  const text = inp?.value?.trim();
  if (!text||mockState.loading) return;
  mockState.messages.push({role:'user',content:text});
  mockState.loading=true; render();
  const pd = PRODUCTS[mockState.product]||PRODUCTS["Mobile App"];
  const system = `You are a senior Capital One PM interviewer for Director-level role. Product: ${mockState.product}. ${pd.description}. Keep responses 2-4 sentences. Ask one follow-up at a time. Challenge vague answers. Push for metrics, business impact, trade-offs. After 6-8 exchanges, wrap up with: structured feedback then SCORE_JSON:{"structure":X,"strategy":X,"data":X,"customer":X,"recommendation":X,"feedback":"2-3 sentence overall assessment"} where X is 0-100.`;
  const apiMsgs = mockState.messages.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content.replace(/<[^>]+>/g,'')}));
  try {
    const reply = await callClaude(apiMsgs, system);
    let display=reply, score=null;
    const sm=reply.match(/SCORE_JSON:(\{[\s\S]*?\})/);
    if(sm){try{score=JSON.parse(sm[1]);}catch(e){}display=reply.replace(/SCORE_JSON:[\s\S]*$/,'').trim();}
    mockState.messages.push({role:'ai',content:display});
    if(score)mockState.score=score;
    mockState.loading=false; render();
  } catch(e) {
    mockState.messages.push({role:'ai',content:`Error: ${e.message}`});
    mockState.loading=false; render();
  }
};

window.handleKey = (e,mode) => {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();mode==='mock'?sendMock():submitPitch();}
};

window.submitPitch = async () => {
  const inp = document.getElementById('pitch-input');
  const text = inp?.value?.trim();
  if (!text||pitchState.loading) return;
  pitchState.messages.push({role:'user',content:text});
  pitchState.loading=true; render();
  const prompt = PITCH_PROMPTS[pitchState.idx];
  const system = `You are a Capital One PM interview coach evaluating a Director-level candidate's pitch. Direct, specific, constructive.

Question: "${prompt.q}"  Type: ${prompt.type}, Product: ${prompt.product}

Evaluate on 4 dimensions (0-100 each):
1. Structure: clear framework? organized logically?
2. Strategy: business thinking, trade-offs, clear point of view?
3. Customer: user empathy, segmentation, JTBD?
4. Clarity: crisp, conviction-driven, no jargon?

Respond ONLY with valid JSON (no other text, no markdown fences):
{"structure":N,"structure_fb":"2-sentence specific feedback","strategy":N,"strategy_fb":"2-sentence specific feedback","customer":N,"customer_fb":"2-sentence specific feedback","clarity":N,"clarity_fb":"2-sentence specific feedback","overall":"3 sentences: what landed, what didn't, single most important fix","improved_pitch":"2-3 sentences showing how they could have opened more powerfully, using a specific C1 product stat or insight"}`;
  try {
    const reply = await callClaude([{role:'user',content:text}], system);
    const clean = reply.replace(/```json|```/g,'').trim();
    const fb = JSON.parse(clean);
    pitchState.feedback=fb; pitchState.loading=false; render();
  } catch(e) {
    pitchState.messages.push({role:'ai',content:`Error parsing feedback: ${e.message}`});
    pitchState.loading=false; render();
  }
};

window.resetPitch = () => { const idx=pitchState.idx; pitchState={idx,messages:[],loading:false,feedback:null}; render(); };

window.saveApiKey = () => {
  const k = document.getElementById('apiKeyInput')?.value?.trim();
  if (!k) return;
  window._apiKey = k;
  try { localStorage.setItem('c1_api_key', k); } catch(e) {}
  const banner = document.getElementById('apiBanner');
  const label = document.getElementById('apiLabel');
  if (banner) { banner.classList.add('ok'); }
  if (label) { label.className='api-label ok'; label.textContent='✓ API KEY SAVED — READY'; }
};

// Auto-load saved key
window._apiKey = '';
try { const saved = localStorage.getItem('c1_api_key'); if(saved){window._apiKey=saved;} } catch(e){}

render();
</script>
</body>
</html>
