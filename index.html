<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital One PM Director Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#CC0000;--red-d:#990000;--red-l:#FF2222;--black:#090909;--surface:#111111;
  --s2:#1A1A1A;--s3:#222222;--s4:#2A2A2A;--border:#2C2C2C;--bl:#383838;
  --text:#EFEFEF;--muted:#888;--dim:#505050;
  --gold:#C9A84C;--green:#27AE60;--amber:#E67E22;--blue:#2E86C1;--purple:#8E44AD;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(204,0,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(204,0,0,.022) 1px,transparent 1px);
  background-size:48px 48px;}
#app{position:relative;z-index:1;}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;}
.hex{width:80px;height:80px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:white;margin:0 auto 32px;animation:hpulse 3s ease-in-out infinite;}
@keyframes hpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06);filter:drop-shadow(0 0 20px rgba(204,0,0,.4))}}
.landing h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5.5vw,56px);font-weight:800;letter-spacing:-1.5px;line-height:1.08;margin-bottom:16px;}
.landing h1 span{color:var(--red);}
.landing .sub{font-size:15px;color:var(--muted);max-width:520px;line-height:1.65;margin-bottom:14px;}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:52px;}
.badge{background:var(--s2);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;max-width:980px;width:100%;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:30px 26px;cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden;}
.mode-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transition:transform .3s;transform-origin:left;}
.mode-card:hover{border-color:rgba(204,0,0,.5);background:var(--s2);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4);}
.mode-card:hover::after{transform:scaleX(1);}
.mode-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);margin-bottom:14px;letter-spacing:3px;}
.mode-icon{font-size:30px;margin-bottom:14px;display:block;}
.mode-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:10px;}
.mode-desc{font-size:13px;color:var(--muted);line-height:1.55;}

/* TOPNAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-hex{width:34px;height:34px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:white;}
.nav-label{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.nav-mode{font-size:11px;color:var(--red);font-family:'DM Mono',monospace;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-back:hover{border-color:var(--muted);color:var(--text);}

/* LAYOUT */
.main-layout{display:flex;height:calc(100vh - 61px);}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.sidebar-label{font-size:9px;letter-spacing:2.5px;color:var(--dim);font-family:'DM Mono',monospace;padding:10px 16px 5px;text-transform:uppercase;}
.si{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin:2px 8px;}
.si:hover{background:var(--s2);color:var(--text);}
.si.active{background:rgba(204,0,0,.12);color:var(--red);border:1px solid rgba(204,0,0,.2);}
.si .si-i{font-size:14px;width:18px;text-align:center;}
.content{flex:1;overflow-y:auto;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;}
.chat-head{padding:18px 26px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.chat-head h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px;}
.chat-head p{font-size:12px;color:var(--muted);}
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:12px;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif;}
.msg.ai .msg-av{background:var(--red);color:white;}
.msg.user .msg-av{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.msg-bub{max-width:72%;padding:13px 16px;border-radius:14px;font-size:14px;line-height:1.65;}
.msg.ai .msg-bub{background:var(--s2);border:1px solid var(--border);border-top-left-radius:4px;}
.msg.user .msg-bub{background:var(--red-d);border:1px solid rgba(255,255,255,.06);border-top-right-radius:4px;}
.msg-bub strong{color:var(--gold);}
.msg-bub ul{padding-left:18px;margin:6px 0;}
.msg-bub li{margin-bottom:4px;color:var(--muted);}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0;}
.typing span{width:6px;height:6px;background:var(--dim);border-radius:50%;animation:tdot 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.chat-input-area{padding:14px 26px;border-top:1px solid var(--border);background:var(--surface);}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-ta{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:11px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;min-height:44px;max-height:160px;outline:none;transition:border-color .15s;line-height:1.5;}
.chat-ta:focus{border-color:var(--red);}
.chat-ta::placeholder{color:var(--dim);}
.send-btn{width:44px;height:44px;background:var(--red);border:none;border-radius:11px;color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send-btn:hover{background:var(--red-l);transform:scale(1.05);}
.send-btn:disabled{background:var(--s3);color:var(--dim);cursor:not-allowed;transform:none;}
.input-hint{font-size:10px;color:var(--dim);margin-top:7px;font-family:'DM Mono',monospace;}

/* SCORECARD */
.scorecard{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:8px;}
.scorecard h3{font-family:'Syne',sans-serif;font-size:14px;margin-bottom:14px;color:var(--gold);}
.sc-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sc-label{font-size:11px;color:var(--muted);width:160px;flex-shrink:0;}
.sc-bar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.sc-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
.sc-num{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;width:32px;text-align:right;}

/* PREP HUB */
.prep-wrap{padding:28px;max-width:920px;}
.prep-wrap h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.prep-sub{color:var(--muted);font-size:14px;margin-bottom:22px;}
.prep-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--s2);padding:4px;border-radius:10px;border:1px solid var(--border);width:fit-content;flex-wrap:wrap;}
.ptab{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.ptab.active{background:var(--red);color:white;}

/* FRAMEWORK CARDS */
.fw-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.fwf{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.fwf:hover{border-color:var(--red);color:var(--text);}
.fwf.active{background:var(--red);border-color:var(--red);color:white;}
.fw-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;transition:border-color .2s;cursor:pointer;}
.fw-card:hover{border-color:var(--bl);}
.fw-card.expanded{border-color:rgba(204,0,0,.35);}
.fw-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:0;}
.fw-badge{padding:3px 9px;border-radius:6px;font-size:10px;font-family:'DM Mono',monospace;flex-shrink:0;white-space:nowrap;}
.fw-badge.pd{background:rgba(204,0,0,.12);color:var(--red);border:1px solid rgba(204,0,0,.2);}
.fw-badge.st{background:rgba(46,134,193,.12);color:var(--blue);border:1px solid rgba(46,134,193,.2);}
.fw-badge.me{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.2);}
.fw-badge.pr{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.2);}
.fw-badge.fi{background:rgba(230,126,34,.12);color:var(--amber);border:1px solid rgba(230,126,34,.2);}
.fw-badge.co{background:rgba(142,68,173,.12);color:var(--purple);border:1px solid rgba(142,68,173,.2);}
.fw-badge.ri{background:rgba(231,76,60,.12);color:#E74C3C;border:1px solid rgba(231,76,60,.2);}
.fw-badge.ca{background:rgba(26,188,156,.12);color:#1ABC9C;border:1px solid rgba(26,188,156,.2);}
.fw-title-block{flex:1;}
.fw-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.fw-use{font-size:11px;color:var(--muted);}
.fw-expand{font-size:16px;color:var(--dim);transition:transform .2s;flex-shrink:0;margin-top:2px;}
.fw-card.expanded .fw-expand{transform:rotate(90deg);}
.fw-body{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.fw-card.expanded .fw-body{display:block;}
.fw-steps{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.fw-step{background:var(--s3);border:1px solid var(--border);padding:3px 9px;border-radius:5px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.fw-desc{font-size:13px;color:var(--muted);line-height:1.65;}
.fw-desc strong{color:var(--text);}
.fw-when{background:rgba(204,0,0,.07);border-left:3px solid var(--red);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.55;}

/* MATH REFERENCE */
.math-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.math-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px;}
.math-card h4{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px;color:var(--gold);}
.math-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
.math-row:last-child{border-bottom:none;}
.math-label{font-size:12px;color:var(--muted);min-width:80px;}
.math-formula{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);text-align:right;flex:1;padding-left:8px;}
.frac-big{font-size:15px;color:var(--green);font-weight:700;}

/* INSIDER TIPS */
.tip-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:11px;display:flex;gap:14px;align-items:flex-start;}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.tip-src{font-size:10px;font-family:'DM Mono',monospace;color:var(--red);margin-bottom:5px;letter-spacing:1px;}
.tip-text{font-size:13px;color:var(--muted);line-height:1.55;}
.tip-text strong{color:var(--text);}

/* PRODUCT KNOWLEDGE */
.pk-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.pk-grid{grid-template-columns:1fr}}
.pk-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:18px;}
.pk-card h4{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;}
.pk-type{font-size:9px;color:var(--red);font-family:'DM Mono',monospace;margin-bottom:10px;letter-spacing:1px;}
.pk-card ul{padding-left:16px;}
.pk-card li{font-size:12px;color:var(--muted);margin-bottom:4px;line-height:1.4;}

/* COMMON QS */
.qcard{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}
.qt{font-size:10px;font-family:'DM Mono',monospace;margin-bottom:8px;}
.qt.st{color:var(--blue);}.qt.me{color:var(--green);}.qt.de{color:var(--red);}.qt.be{color:var(--purple);}.qt.op{color:var(--gold);}
.qtext{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px;}
.qtip{font-size:13px;color:var(--muted);line-height:1.6;}
.qtip strong{color:var(--gold);}

/* PITCH */
.pitch-wrap{display:flex;flex-direction:column;height:100%;}
.pitch-head{padding:18px 26px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.pitch-head h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px;}
.pitch-head p{font-size:12px;color:var(--muted);}
.pitch-body{flex:1;overflow-y:auto;padding:22px 26px;}
.pitch-prompt{background:var(--s2);border:1px solid rgba(204,0,0,.3);border-left:4px solid var(--red);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
.pp-lbl{font-size:10px;color:var(--red);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:8px;}
.pp-txt{font-size:14px;line-height:1.65;}
.fb-section{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:16px;}
.fb-section h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px;color:var(--gold);}
.dim-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.dim-row:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
.dim-sc{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;flex-shrink:0;}
.dim-name{font-size:13px;font-weight:500;margin-bottom:4px;}
.dim-fb{font-size:12px;color:var(--muted);line-height:1.5;}

/* CASE LIBRARY */
.case-wrap{padding:28px;max-width:900px;}
.case-wrap h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.case-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;}
.cf{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.cf:hover{border-color:var(--red);color:var(--text);}
.cf.active{background:var(--red);border-color:var(--red);color:white;}
.ccase{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;cursor:pointer;transition:all .2s;}
.ccase:hover{border-color:rgba(204,0,0,.4);background:var(--s3);}
.ccase.expanded{border-color:rgba(204,0,0,.4);}
.cc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.cc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cc-tag{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;}
.cc-tag.financial{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.25);}
.cc-tag.product{background:rgba(204,0,0,.12);color:var(--red);border:1px solid rgba(204,0,0,.2);}
.cc-tag.strategy{background:rgba(46,134,193,.12);color:var(--blue);border:1px solid rgba(46,134,193,.2);}
.cc-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;}
.cc-prompt{font-size:13px;color:var(--muted);line-height:1.55;}
.cc-exp{font-size:18px;color:var(--dim);flex-shrink:0;transition:transform .2s;}
.ccase.expanded .cc-exp{transform:rotate(90deg);}
.cc-body{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:none;}
.ccase.expanded .cc-body{display:block;}
.cc-sl{font-size:10px;letter-spacing:2px;color:var(--red);font-family:'DM Mono',monospace;margin-bottom:8px;text-transform:uppercase;}
.cc-st{font-size:13px;color:var(--muted);line-height:1.65;}
.ans-box{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-top:6px;}
.ans-box p{font-size:13px;color:var(--muted);line-height:1.65;}

/* UTILS */
.btn-primary{background:var(--red);border:none;color:white;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-primary:hover{background:var(--red-l);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.divider{height:1px;background:var(--border);margin:18px 0;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pdot 2s infinite;}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-state .ei{font-size:40px;margin-bottom:12px;opacity:.5;}

/* API KEY BANNER */
.api-banner{background:var(--s2);border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:0;}
.api-banner.ok{border-color:rgba(39,174,96,.4);}
.api-label{font-size:11px;color:var(--gold);font-family:"DM Mono",monospace;white-space:nowrap;}
.api-label.ok{color:var(--green);}
.api-input{flex:1;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:"DM Mono",monospace;font-size:12px;outline:none;}
.api-input:focus{border-color:var(--gold);}
.api-save{background:var(--gold);border:none;color:var(--black);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;}
.api-save:hover{opacity:.85;}

/* GLOSSARY */
.gl-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.gl-cat{padding:4px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif;}
.gl-cat:hover{border-color:var(--red);color:var(--text);}
.gl-cat.active{background:var(--red);border-color:var(--red);color:white;}
.gl-search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:13px;outline:none;margin-bottom:16px;transition:border-color .15s;}
.gl-search:focus{border-color:var(--red);}
.gl-search::placeholder{color:var(--dim);}
.gl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.gl-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:border-color .2s;}
.gl-card:hover{border-color:var(--bl);}
.gl-term{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.gl-tag{font-size:9px;font-family:"DM Mono",monospace;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.gl-tag.credit{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.25);}
.gl-tag.risk{background:rgba(231,76,60,.12);color:#E74C3C;border:1px solid rgba(231,76,60,.2);}
.gl-tag.metrics{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.2);}
.gl-tag.product{background:rgba(204,0,0,.12);color:var(--red);border:1px solid rgba(204,0,0,.2);}
.gl-tag.shopping{background:rgba(46,134,193,.12);color:var(--blue);border:1px solid rgba(46,134,193,.2);}
.gl-tag.banking{background:rgba(142,68,173,.12);color:var(--purple);border:1px solid rgba(142,68,173,.2);}
.gl-tag.fraud{background:rgba(230,126,34,.12);color:var(--amber);border:1px solid rgba(230,126,34,.2);}
.gl-tag.strategy{background:rgba(26,188,156,.12);color:#1ABC9C;border:1px solid rgba(26,188,156,.2);}
.gl-def{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:6px;}
.gl-why{font-size:11px;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);padding-top:7px;margin-top:7px;}
.gl-why strong{color:var(--red);}
.gl-count{font-size:11px;color:var(--dim);font-family:"DM Mono",monospace;margin-bottom:16px;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

<div id="app"></div>
<script>
// ═══════════════════════ DATA ═══════════════════════

const PRODUCTS = {
  "Mobile App":{icon:"📱",tagline:"10M+ users · flagship banking hub · top-rated",description:"All-in-one banking: account management, P2P transfers, mobile check deposit, Eno AI assistant, CreditWise, virtual card numbers, Zelle, AutoPay, rewards redemption.",users:["Credit card holders","360 Checking customers","Small business owners","Savings customers"],strengths:["Top-rated UX among major banks","Integrated Eno AI + virtual cards","Real-time fraud alerts","Cross-product hub"],weaknesses:["Feature bloat risk","Inconsistent UX across product lines","Weak financial planning vs. Mint/YNAB"],competitors:["Chase Mobile","Bank of America","Chime","Ally"],metrics:["DAU/MAU","Session depth","Mobile deposit usage","CSAT/NPS","Feature adoption rate","D30 retention"],opportunities:["GenAI financial coaching layer","Deeper rewards redemption UX","Business banking expansion"]},
  "Shopping":{icon:"🛍️",tagline:"Free browser extension · auto coupons · 10M installs",description:"Finds coupons automatically, compares prices, awards Credits. Open to non-C1 customers — a top-of-funnel acquisition channel.",users:["Online shoppers","Deal hunters","Non-C1 customers (pipeline)"],strengths:["Works without being a C1 customer","Automatic coupon application","Credits rewards program"],weaknesses:["Extension-only (no mobile app)","Low merchant awareness","Confusing Credits redemption UX"],competitors:["Honey (PayPal)","Rakuten","RetailMeNot","Google Shopping"],metrics:["Extension installs","MAU","Savings delivered ($)","Credits redemption rate","CAC via Shopping","Conversion to C1 product"],opportunities:["Mobile-first redesign","Personalized deal alerts via ML","Post-Honey differentiation strategy"]},
  "Eno":{icon:"🤖",tagline:"AI virtual assistant · virtual cards · proactive alerts",description:"24/7 support, virtual card numbers for secure shopping, proactive fraud/spending alerts, natural language account queries.",users:["Security-conscious shoppers","High-frequency digital bankers"],strengths:["Virtual card numbers (unique differentiator)","Proactive anomaly alerts","Natural language interface"],weaknesses:["C1 customers only — limits scale","Pre-GenAI architecture feels dated","Low activation despite strong value prop"],competitors:["Erica (BofA)","Chase AI","Cleo","ChatGPT plugins"],metrics:["Eno activation rate","Virtual card creations/month","Alert action rate","Fraud prevented ($)","Session containment rate"],opportunities:["GenAI rebuild: conversational financial planning","Proactive financial health coaching","Third-party integrations"]},
  "CreditWise":{icon:"📊",tagline:"Free credit monitoring · 20M users · open to all",description:"Free TransUnion VantageScore, credit report alerts, Dark Web monitoring, score simulator. Serves non-C1 customers as an acquisition funnel.",users:["Credit builders","Score-improvers","Non-C1 customers","Young adults starting credit journeys"],strengths:["Free and open to all","Dark Web monitoring differentiator","Score simulator for what-if scenarios"],weaknesses:["VantageScore ≠ FICO","Only TransUnion (no Experian/Equifax)","Less comprehensive than Credit Karma Premium"],competitors:["Credit Karma (Intuit)","Experian free tier","NerdWallet","myFICO"],metrics:["Total users","DAU/MAU","Alert engagement","Conversion to C1 product","Score improvement over 6 months"],opportunities:["FICO score partnership","AI credit improvement roadmap","Premium tier","Card recommendation engine"]},
  "Auto Navigator":{icon:"🚗",tagline:"Pre-qualify for auto financing · 500K+ vehicles · soft pull",description:"Soft-pull pre-qualification shows real monthly payments before dealership visit. 2023 expansion added B2B dealer platform tools.",users:["First-time car buyers","Trade-in shoppers","Credit-building borrowers","Dealer partners (B2B)"],strengths:["Soft pull (no score impact)","500K+ inventory","Transparent payment calculator","Strong dealer network"],weaknesses:["Requires participating dealerships","No private seller marketplace","40% pre-qualify but never visit"],competitors:["CarMax","TrueCar","Carvana","AutoFi"],metrics:["Pre-qualifications","Dealership visit conversion","Loan origination ($)","Dealer partner count","EV loan %"],opportunities:["EV financing specialization","Private seller marketplace","Insurance bundling","Reduce pre-qualify→dealership 40% drop-off"]},
  "Venture X":{icon:"✈️",tagline:"$395/yr premium travel card · competes with Chase Sapphire",description:"2x miles everywhere, 10x on hotels/rentals via C1 Travel. Airport lounge access (Priority Pass + C1 Lounges). $300 travel credit. 75K intro bonus.",users:["Frequent travelers","Business travelers","Premium card switchers","Affluent millennials"],strengths:["Competitive sign-up bonus","Flexible miles (15+ partners)","Lower fee than Amex Platinum ($695)"],weaknesses:["Chase Sapphire brand dominance","Fewer partners than Amex","Limited C1 Lounge footprint"],competitors:["Chase Sapphire Reserve","Amex Platinum","Citi Prestige","Bilt"],metrics:["New card acquisitions","Spend per cardholder","Travel portal booking rate","Year-1 retention","Lounge visit frequency"],opportunities:["Lounge network expansion","Business travel features","Hotel co-brand partnership","AI travel planner"]}
};

// FRAMEWORKS — from your 12 flashcards + best-in-class PM frameworks
const FRAMEWORKS = [
  // ── PRODUCT DESIGN ──
  {name:"CIRCLES Method",badge:"PRODUCT DESIGN",bc:"pd",when:"Use when: designing a feature, improving a product, or answering 'How would you redesign X?'",steps:["Comprehend the situation","Identify the users","Report the needs","Cut (prioritize)","List solutions","Evaluate trade-offs","Summarize recommendation"],desc:"The most-used PM design framework at Capital One. Start broad (who is this for?) then narrow to one user segment and one problem. <strong>Don't skip 'Cut'</strong> — they want to see prioritization judgment, not a feature wish list. Always close with a recommendation and 2 explicit trade-offs."},
  {name:"Jobs-To-Be-Done (JTBD)",badge:"PRODUCT DESIGN",bc:"pd",when:"Use when: you want to show deep user empathy and why users really use a product",steps:["Functional job: what task must be done?","Emotional dimension: how do they want to feel?","Social dimension: how do they want to be perceived?","Current solution + its friction","Your solution's advantage","Success metric for the job"],desc:"Rather than designing features, show you understand the underlying job. CreditWise users' JTBD isn't 'check credit score' — it's <strong>'feel in control of my financial future.'</strong> Eno's JTBD isn't 'send alerts' — it's 'protect me without requiring effort.' Tie every product decision back to the job."},
  {name:"User Persona + Pain-Point Map",badge:"PRODUCT DESIGN",bc:"pd",when:"Use when: any design question — always segment before proposing solutions",steps:["Segment users (2-3 personas max)","Define primary persona: demographics + behavior","Jobs they need done","Top 3 pain points per persona","Prioritize which persona to design for","Solution tailored to that persona only"],desc:"Capital One expects Director-level PMs to segment users before proposing solutions. Specificity beats generality: <strong>'A 28-year-old gig worker using CreditWise wants to improve her score before applying for Auto Navigator'</strong> is stronger than 'users want a better score.' Name the persona, name the pain, then solve it."},

  // ── STRATEGY & ROADMAP ──
  {name:"Revenue Growth Strategies",badge:"STRATEGY",bc:"st",when:"Use when: 'How would you grow revenue for X?' (directly from your flashcards)",steps:["① Improve cost: UX upgrade, pricing strategy, upgrade market experience","② Expand geographically: sell supply in existing geographies, launch from existing model in new countries","③ New customer segments: new income group, new age group, B2B/B2C pivot","④ New product offerings: new pricing strategy, complementary products, add-on services, private label, diversify"],desc:"Directly from your BS-Revenue Strategies flashcard. For PM interviews: apply to Capital One. CreditWise growth = new segments (non-C1 monetized via premium) + new products (FICO add-on) + geographic expansion (Canada). <strong>Always tie each strategy to a P&L impact estimate.</strong>"},
  {name:"Profit Growth Strategies",badge:"STRATEGY",bc:"st",when:"Use when: 'How would you improve profitability of X?' (directly from your flashcards)",steps:["Increase Revenue (see revenue framework above)","Decrease Costs: FC cutting by economies of scale, VC renegotiate with vendors, shut down high-cost facilities, consolidate vertically, outsourcing","Other: higher margins via brand, cost-segment growth on product lines, eliminate mid-tier alternatives, reduce unnecessary performance features, performance-based compensation"],desc:"From your BS-Profit Strategies flashcard. At Director PM level, frame cost decisions as product decisions: sunset low-margin features, consolidate infrastructure, eliminate redundant tools. <strong>C1 interviewers love P&L thinking</strong> — always quantify the cost impact of your product recommendations."},
  {name:"Market Attractiveness (MRT Star)",badge:"STRATEGY",bc:"st",when:"Use when: 'Should C1 enter X market?' or evaluating a new product opportunity",steps:["Market: size, penetration, frequency, growth rate, competition, barriers to entry, buy/sell/substitute threats","Go-to-Market Star: operations, time to execute, OPS capability, financial viability, synergies, expected success, ROI/NPV","Risks: market-specific, financial, operational"],desc:"Directly from your MRT Attractiveness Factors flashcard. For PM interviews: market attractiveness + operational feasibility + financial case + risk. <strong>Never just do market sizing — always close with operational readiness and risk.</strong> Interviewers want to see all three dimensions."},
  {name:"AARRR Pirate Metrics",badge:"STRATEGY",bc:"st",when:"Use when: 'How would you grow C1 Shopping?' or any growth question",steps:["Acquisition — how do new users find us?","Activation — first value moment (aha moment)","Retention — do they come back?","Revenue — how do we monetize?","Referral — do they tell others?"],desc:"Pick the weakest stage and focus your recommendation there. For Shopping: Acquisition is strong (10M installs) but <strong>Activation and Revenue conversion are weak.</strong> For CreditWise: Retention is strong but Referral and Revenue (card conversion) are the opportunity. Always name the stage, diagnose why it's weak, then propose fixes."},
  {name:"OKRs + Product Roadmap",badge:"STRATEGY",bc:"st",when:"Use when: 'How would you build the roadmap for X?' or 'How do you prioritize competing demands?'",steps:["Set Objectives (qualitative, inspirational, time-bound)","Define Key Results (measurable, 0→1 scale)","Map initiatives to specific KRs","Prioritize with RICE or MoSCoW","Sequence: Now / Next / Later (3-horizon)","Stakeholder alignment + communication plan"],desc:"At Director level, C1 expects you to connect features to OKRs. Don't just list features — explain the outcome chain: <strong>'We're building X because it moves KR2 (Eno activation 12%→30%) which supports our Objective: make Eno the #1 financial AI assistant by Q3.'</strong> Always show the logic chain from feature → KR → Objective."},
  {name:"BS — Build/Buy/Partner",badge:"STRATEGY",bc:"st",when:"Use when: 'Should C1 build X in-house, acquire a company, or partner?'",steps:["Build: core competency? unique data moat? full control needed?","Buy: faster time-to-market? talent acquisition? kill competitive threat?","Partner: complementary capability? regulated space? lower risk?","Evaluate: time, cost, control, risk, strategic fit","Recommendation + exit criteria if partnership fails"],desc:"Key for fintech PM interviews. Auto Navigator → did C1 build or partner with dealers? Shopping → why not acquire Honey? For each option: <strong>time to market, total cost of ownership, strategic defensibility, and risk.</strong> Always give a clear recommendation and defend it."},

  // ── METRICS & DIAGNOSIS ──
  {name:"North Star + Metrics Tree",badge:"METRICS",bc:"me",when:"Use when: 'How would you measure success?' or 'Metrics dropped 20% — diagnose'",steps:["Define North Star Metric (1 metric capturing core value)","Break into input/driver metrics","Set guardrail metrics (protect these)","Segment by cohort, platform, geography","Diagnose root cause with data","3 ranked hypotheses + how to test each"],desc:"For diagnosis: rule out external factors first (seasonality, competitor action, platform outage), then segment internally. <strong>Never jump to solutions.</strong> End with 3 ranked hypotheses and explicit experiments. Saying 'I'd check the data' without specifics is a red flag at Director level."},
  {name:"HEART Framework (Google)",badge:"METRICS",bc:"me",when:"Use when: 'What metrics would you track for Eno/Shopping/Mobile App?'",steps:["Happiness: satisfaction, NPS, CSAT, App Store rating","Engagement: DAU, session depth, feature usage frequency","Adoption: new users, % of eligible base using feature","Retention: D7/D30/D90, churn rate, annual fee renewal","Task Success: completion rate, error rate, time-on-task"],desc:"Pick 2-3 most relevant dimensions and explain why. For Eno: <strong>Happiness (CSAT after virtual card use) + Adoption (activation %) + Task Success (containment rate)</strong> are the priority trio. For Venture X: Happiness + Retention (year-1 renewal) + Engagement (monthly spend per cardholder)."},
  {name:"GAME Framework",badge:"METRICS",bc:"me",when:"Use when: 'Define the success metrics for a new feature launch'",steps:["Goals: what is the business/user goal?","Actions: what user behaviors drive those goals?","Metrics: what do you measure per action?","Evaluations: how do you interpret the data?"],desc:"<strong>GAME = Goals → Actions → Metrics → Evaluations.</strong> Don't just list metrics — explain the logic chain. Interviewers at C1 specifically look for this structure in analytics questions. Bad answer: 'I'd track DAU.' Good answer: 'Our goal is feature adoption → users need to trigger virtual card creation → I'd track virtual card activation rate as the primary metric → an activation rate under 15% signals an awareness/UX problem.'"},
  {name:"Root Cause Diagnosis (DEC)",badge:"METRICS",bc:"me",when:"Use when: 'Our DAU dropped 15% — walk me through how you'd investigate'",steps:["Define: confirm metric, timeframe, magnitude","External: seasonality? competitor action? macro event?","Cohort: new vs. returning? by acquisition channel?","Platform: iOS vs Android? Web vs App? By geography?","Funnel step: where in the funnel did volume drop?","Conclude: 1 root cause + proposed experiment"],desc:"DEC = Define, Explore, Conclude. <strong>Never say 'I would check the data'</strong> — be specific about which data, which segments, which time window. Always end with a definitive root cause even under uncertainty. Ambiguity tolerance is exactly what they're testing."},
  {name:"Funnel Analysis",badge:"METRICS",bc:"me",when:"Use when: any conversion or drop-off problem — 'why aren't users completing X?'",steps:["Map the full user funnel step-by-step","Calculate conversion rate at each step","Identify the biggest absolute drop-off point","Segment the drop: by cohort, device, date, channel","Hypothesize root cause per segment","Propose A/B test to validate fix"],desc:"Directly applicable to C1 cases: <strong>Auto Navigator pre-qualify→dealership 40% drop</strong>, Eno activation drop, Shopping Credits non-redemption. Always draw the funnel visually when possible. The biggest % drop is your answer's focus — not the last step."},

  // ── PRIORITIZATION ──
  {name:"RICE Scoring",badge:"PRIORITIZATION",bc:"pr",when:"Use when: 'How would you prioritize these 5 features?' — most rigorous PM framework",steps:["Reach: how many users affected per quarter?","Impact: 3=massive, 2=high, 1=medium, 0.5=low, 0.25=minimal","Confidence: 100%/80%/50% — how sure are you?","Effort: person-months required","Score = (Reach × Impact × Confidence) / Effort","Rank and recommend top 2-3 with rationale"],desc:"The gold standard for PM prioritization. <strong>Practice verbal RICE:</strong> 'Feature A scores ~450 (500K users × 2 impact × 90% confidence / 2 months) vs. Feature B at ~200 — I'd prioritize A.' Always justify your numbers — they don't need to be precise, they need to be logical."},
  {name:"MoSCoW Prioritization",badge:"PRIORITIZATION",bc:"pr",when:"Use when: quick roadmap trade-offs with stakeholders — simpler than RICE",steps:["Must Have: table stakes, blocks launch","Should Have: high value, not critical to ship","Could Have: nice-to-have, add if bandwidth","Won't Have (this cycle): explicitly deprioritized and why"],desc:"The <strong>'Won't Have' category is the most powerful</strong> — it shows hard trade-offs. At Director level: always explain why something is a Won't Have (cost, risk, strategic misalignment). Stakeholders push back on Won't Haves; showing you've thought about it signals leadership maturity."},
  {name:"Impact vs. Effort Matrix",badge:"PRIORITIZATION",bc:"pr",when:"Use when: visual prioritization, especially when discussing engineering trade-offs",steps:["Plot features on 2×2: Impact (Y-axis) vs Effort (X-axis)","Quick Wins: high impact + low effort → do first","Big Bets: high impact + high effort → plan carefully for Q3/Q4","Fill-ins: low impact + low effort → do if bandwidth","Avoid: low impact + high effort → cut"],desc:"The 2×2 is the fastest framework to verbalize in an interview. Say it out loud: <strong>'I'd map these to an impact/effort matrix — virtual card discovery is a Quick Win, a GenAI rebuild is a Big Bet for Q3, and the notification UI refresh is a Fill-in.'</strong> Always name which quadrant each item falls into."},
  {name:"Kano Model",badge:"PRIORITIZATION",bc:"pr",when:"Use when: distinguishing what users expect vs. what would delight them",steps:["Must-Be (threshold): expected basics — absence = dissatisfied","Performance: more = better (linear satisfaction)","Delighters: unexpected features that create delight","Indifferent: users don't care either way","Reverse: some users dislike this feature"],desc:"Use Kano to show customer empathy depth. For Venture X: <strong>security = Must-Be, reward rate = Performance, exclusive lounge access = Delighter.</strong> Always close: 'I'd invest most in Delighters because they create defensible differentiation that Amex and Chase can't instantly replicate.'"},

  // ── COMPETITOR ANALYSIS ──
  {name:"SWOT + Strategic Response",badge:"COMPETITOR",bc:"co",when:"Use when: 'How do we respond to Honey/PayPal?' or any competitive threat",steps:["Strengths (internal)","Weaknesses (internal)","Opportunities (external)","Threats (external)","SO: leverage strengths to capture opportunities","WT: protect weaknesses from active threats","→ One clear recommendation with conviction"],desc:"Don't just list quadrants — that's table stakes. <strong>Close with conviction:</strong> 'We should not try to out-Honey Honey. Our moat is card-linked rewards — something Honey literally cannot replicate.' At Director level: choose which battle to fight and which to concede. Showing strategic restraint is a strength."},
  {name:"Porter's Five Forces (PM lens)",badge:"COMPETITOR",bc:"co",when:"Use when: 'Should C1 enter X market?' — deep competitive analysis",steps:["Threat of new entrants: capital, regulation, tech barriers","Bargaining power of buyers: switching costs, alternatives","Bargaining power of suppliers: concentration, dependency","Threat of substitutes: alternatives solving same job","Competitive rivalry: number, growth rate, differentiation"],desc:"From your MRT flashcard's market analysis section. For C1 fintech: high rivalry + low switching costs = the competitive moat question is always relevant. <strong>Always connect Five Forces to C1's data and brand moat</strong> as the defensible answer. Never just describe the forces — use them to justify your recommendation."},

  // ── FINANCIAL (all from your flashcards) ──
  {name:"Revenue–Cost–Profit + Break-Even",badge:"FINANCIAL",bc:"fi",when:"Use when: ANY financial case — the foundational C1 framework (all cases use this)",steps:["Revenue = Price × Volume (or rate × base amount)","Variable Costs: labour, raw materials, packaging, commissions, discounts, selling","Fixed Costs: rent, depreciation, insurance, machinery, marketing, overhead salaries, R&D, logistics","Gross Profit = Revenue − COGS","Operating Profit = Gross Profit − SG&A","Break-even: Fixed Cost = Qty × Contribution Margin","Contribution Margin = Price − Variable Cost"],desc:"<strong>Every C1 financial case uses Revenue − Cost = Profit.</strong> Know it cold. Always separate fixed vs. variable costs (your flashcards list them). Ask: is this rate annual or monthly? What is the base? Always present a profit number before giving recommendations. Break-even Qty = FC ÷ Contribution Margin."},
  {name:"Margin Analysis",badge:"FINANCIAL",bc:"fi",when:"Use when: 'Why is margin declining?' or profitability diagnosis cases",steps:["Gross Margin = (Net Sales − COGS) / Revenue","Operating Margin = (Gross Profit − SG&A) / Revenue","Net Margin = Net Income / Revenue","Contribution Margin = Unit Price − Variable Cost","Compare vs. prior period AND vs. competitors","Identify which margin is compressing and diagnose why"],desc:"From your Margins flashcard. <strong>Gross margin compression = COGS problem. Operating margin compression = overhead/opex problem. Net margin compression = below-the-line issue.</strong> For PM interviews: if a product's profitability is declining, always diagnose which margin layer is affected before recommending solutions."},
  {name:"NPV + ROI + Rule of 72",badge:"FINANCIAL",bc:"fi",when:"Use when: 'Should we invest in X?' or capital allocation decisions",steps:["ROI = (Gain − Fixed Cost) / Fixed Cost","NPV (Perpetuity) = Cash Flow / (Discount Rate − Growth Rate)","NPV (Annuity) = C₀ + C₁/(1+r) + C₂/(1+r)² + ...","PVP = 1−(1+r)^n / r  (annuity factor)","Rule of 72: investment doubles in 72 ÷ growth rate years","Payback period = Investment ÷ Annual profit"],desc:"From your NPV/ROI flashcard. For PM interviews: when asked 'should we build this?', use ROI or payback period. <strong>'The $5M mobile deposit build pays back in 2.3 years given $2.1M annual cost savings. ROI = 42% — above C1's hurdle rate.'</strong> This shows financial fluency that Director-level PMs need."},
  {name:"Expected Value + Decision Tree",badge:"FINANCIAL",bc:"fi",when:"Use when: probability-based decisions — 'Should we bid?' 'Should we approve?'",steps:["Identify all decision options","Assign probability to each outcome","Calculate profit/loss per scenario","EV = Σ (probability × outcome)","Compare EVs across all options","Recommend: highest EV + risk appetite caveat"],desc:"From your Adventure Land and Credit Card over-limit cases. <strong>When there's probability: always compute EV explicitly.</strong> State best case, worst case, and expected value. At Director level: also discuss risk tolerance. 'EV of $25.6M > certain $25M, but we need confidence in that 80% success assumption — what's the basis for it?'"},
  {name:"Market Sizing (Volume × Price)",badge:"FINANCIAL",bc:"fi",when:"Use when: 'Estimate the size of X market' or guesstimate questions",steps:["Volume = # entities × penetration rate × frequency × actual usage","Price = standard / penetration / differentiated / premium","Market Size = Volume × Price","Controls: # stores/customers, actual usage, market shares, notes","Sense-check: top-down (total population) vs. bottom-up (target segment)","State assumptions clearly; give a range"],desc:"From your Market Sizing flashcard: <strong>Volume × Price is the formula.</strong> For Capital One: 'TAM for CreditWise-type products = 250M US adults × 40% interested in credit monitoring × $10/mo = $12B/year.' Always state your assumptions before calculating — they're testing your reasoning, not your arithmetic."},

  // ── RISK ──
  {name:"Risks & Challenges Framework",badge:"RISK",bc:"ri",when:"Use when: 'What could go wrong?' or evaluating a new product/market entry",steps:["Market-Specific Risks: competition, M&A happening, not consolidating, DD/SS shifts, barriers to entry, substitute products, compensation/penalty clauses","Financial Risks: revenue shortfall, cost overrun, capital-related issues","Operational Risks: people/org issues, OPS capacity, scalability issues, technology failure, data security"],desc:"Directly from your BS Risks & Challenges flashcard. <strong>Always address risk in your recommendation.</strong> Structure: 'The top 3 risks are [market], [financial], and [operational]. To mitigate: [specific action each].' Showing failure modes at Director level signals strategic maturity — not pessimism."},

  // ── CAPITAL ONE SPECIFIC ──
  {name:"Credit & Loan Decision Framework",badge:"C1-SPECIFIC",bc:"ca",when:"Use when: credit card, lending, or risk product cases — C1's core business",steps:["Customer/Market: target segment, loan purpose, industry, MRT demand & competition","Credit Risk: Debt/Income ratio, historical repayment, credit history, collateral, guarantors","Operational: underwriting speed, fraud controls, credit selection, collection capacity, lending regulation","Financial: costs (mktg, charge-offs, EPS/COC), revenue (interest, fees, interchange), profitability/ROI, P&L breakdown"],desc:"From your Loan Factors flashcard — C1's bread and butter. For Director PM: frame every credit product through this lens. <strong>Eno virtual cards → fraud risk. Auto Navigator → credit risk at sale. CreditWise → credit education to reduce default.</strong> Show you understand the risk-reward model of financial products."},
  {name:"Hook Model (Habit Formation)",badge:"C1-SPECIFIC",bc:"ca",when:"Use when: designing features that need to drive repeat usage (Eno, Shopping, CreditWise)",steps:["Trigger: external (notification, email) → internal (emotion/habit)","Action: simplest behavior in anticipation of reward","Variable Reward: tribe (social), hunt (resources), self (mastery)","Investment: user invests time/data → makes future triggers more likely"],desc:"The Hook Model explains why Eno alerts work (external trigger → action → reward of safety), why CreditWise score checks are habit-forming (external trigger → action → variable reward of score change), and why Shopping installs convert poorly (no internal trigger). <strong>Use at Director level to show you design for sustained engagement, not just first use.</strong>"},
];

// MATH REFERENCE CARDS (all from your 12 flashcard images)
const MATH_CARDS = [
  {title:"Key Formulas",color:"var(--gold)",rows:[
    {l:"Gross Margin",f:"(Net Sales − COGS) / Revenue"},
    {l:"Operating Margin",f:"(GP − SG&A) / Revenue"},
    {l:"Net Margin",f:"Net Income / Revenue"},
    {l:"Contribution Margin",f:"Unit Price − Variable Cost"},
    {l:"Break-Even Qty",f:"Fixed Cost ÷ Contribution Margin"},
    {l:"ROI",f:"(Gain − Fixed Cost) / Fixed Cost"},
    {l:"NPV (Perpetuity)",f:"Cash Flow ÷ (Disc. Rate − Growth Rate)"},
    {l:"NPV (Annuity)",f:"C₀ + C₁/(1+r) + C₂/(1+r)² + ..."},
    {l:"Rule of 72",f:"72 ÷ Growth Rate = years to double"},
    {l:"RICE Score",f:"(Reach × Impact × Confidence) / Effort"},
  ]},
  {title:"Fraction → % (Mental Math)",color:"var(--green)",rows:[
    {l:"1/6",f:"16.67%"},{l:"1/5",f:"20%"},{l:"1/4",f:"25%"},{l:"1/3",f:"33.33%"},
    {l:"1/2",f:"50%"},{l:"1/7",f:"14.28%"},{l:"1/9",f:"11.11%"},{l:"1/11",f:"9.09%"},
    {l:"1/12",f:"8.33%"},{l:"1/15",f:"6.67%"},{l:"1/16",f:"6.25%"},{l:"1/18",f:"5.55%"},

// ═══════════════════════ GLOSSARY ═══════════════════════
const GLOSSARY = [
  // ── CREDIT CARD ECONOMICS ──
  {term:"Interchange Fee",cat:"credit",tag:"CREDIT",def:"A fee paid by the merchant's bank to Capital One every time a customer swipes a C1 card. Typically 1.5–2% of the transaction amount. This is Capital One's primary revenue source on credit cards — not interest.",why:"C1 PM context: Understanding interchange is critical for Shopping and rewards product cases. Higher spend = more interchange. That's why C1 Shopping and Venture X are designed to drive card-linked spend."},
  {term:"APR (Annual Percentage Rate)",cat:"credit",tag:"CREDIT",def:"The annual interest rate charged on unpaid credit card balances. Capital One cards range from ~20–30% APR depending on creditworthiness. Applied monthly (APR ÷ 12) to the revolving balance.",why:"C1 PM context: Revolvers (customers who carry a balance) generate interest income. A 1% increase in revolver rate has enormous P&L impact. Always ask: is this a revolver or transactor population?"},
  {term:"Revolving Balance",cat:"credit",tag:"CREDIT",def:"The portion of a credit card balance that is carried month-to-month (not paid in full). Revolvers pay APR interest on this balance. The core of C1's net interest margin business.",why:"C1 PM context: Features that increase engagement (Eno alerts, autopay setup) can reduce revolving balances — a double-edged sword: great for the customer, reduces interest revenue short-term."},
  {term:"Transactor",cat:"credit",tag:"CREDIT",def:"A credit card customer who pays their full statement balance every month — incurring zero interest charges. Generates revenue only via interchange fees and annual fees.",why:"C1 PM context: Venture X customers skew transactor (high-income, full-pay). Revenue model = interchange + $395 fee, not interest. Product strategy differs completely from subprime/revolver segments."},
  {term:"Revolver",cat:"credit",tag:"CREDIT",def:"A customer who carries a balance month-to-month and pays interest. The primary source of net interest income for Capital One. Higher credit risk, but higher revenue per customer.",why:"C1 PM context: Many C1 legacy products (Quicksilver, Platinum) target revolvers. Features like payment reminders or budget tools can reduce revolving — manage the tension between customer benefit and P&L."},
  {term:"Credit Limit",cat:"credit",tag:"CREDIT",def:"The maximum amount a cardholder can charge on their card. Set by C1's underwriting model based on credit score, income, debt-to-income ratio, and risk tier. Customers can request increases.",why:"C1 PM context: Credit limit increases drive higher spend (and interchange). Auto-limit increases are a product feature with direct P&L impact. Auto Navigator pre-qualification is essentially a credit limit decision in real-time."},
  {term:"Utilization Rate",cat:"credit",tag:"CREDIT",def:"The percentage of a credit limit being used. Formula: Balance ÷ Credit Limit. High utilization (>30%) hurts credit scores. CreditWise tracks this as a key metric.",why:"C1 PM context: CreditWise Score Simulator models utilization impact. Eno alerts that warn about high utilization are a product feature with direct customer value — and a retention driver."},
  {term:"Minimum Payment",cat:"credit",tag:"CREDIT",def:"The smallest payment a cardholder must make each month to avoid a late fee. Typically 1–2% of the balance or $25. Paying only minimums maximizes revolver revenue for C1 but maximizes cost for the customer.",why:"C1 PM context: Autopay default (full balance vs. minimum) is a UX design decision with ethical + P&L implications. Director-level PMs must navigate this tension."},
  {term:"Annual Fee",cat:"credit",tag:"CREDIT",def:"A yearly fee charged for premium credit cards. Venture X = $395/year. Must be offset by card benefits (travel credits, lounge access, rewards) to justify for the customer.",why:"C1 PM context: Year-1 vs. year-2 retention on Venture X is a key PM challenge. If perceived value < $395, customers downgrade. Feature design must make the $300 travel credit feel automatic and easy."},
  {term:"Rewards Liability",cat:"credit",tag:"CREDIT",def:"The accounting cost of unredeemed rewards points/miles sitting on customer accounts. C1 carries this as a liability on its balance sheet until miles are redeemed.",why:"C1 PM context: If you add a new rewards feature, finance will ask about rewards liability impact. High redemption rates reduce liability (good for balance sheet) but cost cash."},
  {term:"Net Interest Margin (NIM)",cat:"credit",tag:"CREDIT",def:"The spread between the interest C1 earns on loans/cards (APR) and what it pays to fund those loans (cost of funds). Core profitability metric for credit card businesses. NIM = Interest Income − Funding Cost.",why:"C1 PM context: When evaluating a new credit product, always ask: what's the expected NIM? A card with 25% APR and 3% cost of funds has 22% NIM before charge-offs and operating costs."},
  {term:"Cost of Funds",cat:"credit",tag:"CREDIT",def:"The interest rate Capital One pays to borrow the money it then lends to cardholders. Usually tied to the Fed Funds Rate. If C1 funds at 3% and charges 20% APR, the gross NIM is 17%.",why:"C1 PM context: From your uploaded cases — the credit card over-limit case uses this directly. Cost of funds affects break-even analysis for any credit product or feature."},

  // ── RISK & COLLECTIONS ──
  {term:"Charge-Off",cat:"risk",tag:"RISK",def:"When Capital One determines a delinquent balance (usually 180+ days past due) is unlikely to be collected and writes it off as a loss. The charge-off rate is one of the most watched credit risk metrics.",why:"C1 PM context: Charge-off rate directly impacts P&L. A credit product feature that reduces default (e.g., better payment reminders, early hardship detection) has quantifiable P&L value. Always model charge-off assumptions."},
  {term:"Delinquency Rate",cat:"risk",tag:"RISK",def:"The percentage of accounts that are 30, 60, or 90+ days past due. A leading indicator of future charge-offs. Tracked at 30-DPD, 60-DPD, 90-DPD buckets.",why:"C1 PM context: Eno payment alerts are a product that directly addresses early delinquency. If you can show a feature reduces 30-DPD by even 0.5%, you've quantified enormous P&L impact."},
  {term:"Default Rate",cat:"risk",tag:"RISK",def:"The percentage of borrowers who fail to repay their loans. Used in break-even analysis for credit decisions. From your case: 2% default rate on a $300 transaction changes the approve/decline decision.",why:"C1 PM context: Used in the credit card over-limit case directly. Break-even default rate = the default rate at which revenue equals loss. Every credit product decision has one."},
  {term:"Collections",cat:"risk",tag:"RISK",def:"The process of recovering unpaid balances from delinquent customers. Includes internal collections teams, third-party debt collectors, and legal action. Capital One has a large collections operation.",why:"C1 PM context: Features that reduce collections burden (early alert, hardship programs, AI-driven payment reminders) are product opportunities with direct cost impact. Quantify: cost per collection account vs. cost of proactive feature."},
  {term:"Loss Given Default (LGD)",cat:"risk",tag:"RISK",def:"The amount Capital One loses when a customer defaults, after any recovery. If a $1,000 balance defaults and C1 recovers $200, LGD = $800 (80%).",why:"C1 PM context: Used in risk modeling for credit decisions. When pitching a new credit feature, you may need to model expected LGD × default rate to get CFO sign-off."},
  {term:"Probability of Default (PD)",cat:"risk",tag:"RISK",def:"The statistical likelihood that a borrower will default within a given time period. Used in C1's underwriting models. Higher PD = lower credit limit offered or declined.",why:"C1 PM context: Auto Navigator pre-qualification uses PD models in real-time. CreditWise helps customers understand what drives their PD. A product PM must understand what signals PD models use."},
  {term:"Dispute",cat:"risk",tag:"RISK",def:"A customer's formal challenge to a charge on their account — claiming it was fraudulent, unauthorized, or incorrect. C1 must investigate within regulatory timeframes (Reg Z / Reg E).",why:"C1 PM context: Disputes are costly to process ($15–50 per dispute). Eno's virtual card numbers reduce dispute rates by isolating merchant breaches. This is a quantifiable ROI for the virtual card feature."},
  {term:"Fraud Rate",cat:"fraud",tag:"FRAUD",def:"The percentage of transactions that are unauthorized/fraudulent. Measured in basis points (bps). Industry average ~6–8bps. Capital One uses ML models to flag suspicious transactions in real-time.",why:"C1 PM context: Mobile check deposit fraud (same check deposited twice) is from your case. Any new payment feature must model expected fraud rate × average transaction amount to assess risk."},
  {term:"Card-Not-Present (CNP) Fraud",cat:"fraud",tag:"FRAUD",def:"Fraud occurring in online transactions where the physical card isn't used — the most common type. Eno's virtual card numbers directly address CNP fraud by giving each merchant a unique card number.",why:"C1 PM context: Eno virtual cards = a direct product response to CNP fraud. When pitching Eno features, quantify: CNP fraud rate × average transaction × customers protected = fraud prevented ($)."},
  {term:"Chargeback",cat:"fraud",tag:"FRAUD",def:"When a customer disputes a transaction and C1 forcibly reverses it, billing the merchant's bank instead. Different from a write-off — C1 recoups money from the merchant network.",why:"C1 PM context: High chargeback rates signal either merchant fraud issues or customer abuse. A feature that reduces illegitimate chargebacks (better transaction descriptions, real-time merchant info) has direct cost savings."},
  {term:"Account Takeover (ATO)",cat:"fraud",tag:"FRAUD",def:"When a fraudster gains access to a legitimate customer's account by stealing credentials. Eno alerts and real-time transaction notifications are primary defenses.",why:"C1 PM context: ATO is a growing threat as more transactions move digital. Features like biometric auth, device fingerprinting, and Eno real-time alerts are ATO countermeasures with quantifiable fraud-prevented ROI."},
  {term:"Synthetic Identity Fraud",cat:"fraud",tag:"FRAUD",def:"A fraudster creates a fake identity (real SSN + fake name) to open a credit account, builds credit history, then maxes out and disappears. Hardest to detect — it looks like a real customer.",why:"C1 PM context: CreditWise Dark Web monitoring is partly a defense against synthetic identity. At Director level: knowing the fraud types shows operational depth when discussing credit product decisions."},

  // ── KEY METRICS ──
  {term:"NPS (Net Promoter Score)",cat:"metrics",tag:"METRICS",def:"A customer loyalty metric: 'How likely are you to recommend Capital One to a friend?' (0–10). Promoters (9–10) minus Detractors (0–6). Range: −100 to +100. C1 tracks NPS across all products.",why:"C1 PM context: NPS is a guardrail metric — it tells you if a feature is hurting customer sentiment even if other metrics look fine. Always include NPS as a health check in your metrics frameworks."},
  {term:"CSAT (Customer Satisfaction Score)",cat:"metrics",tag:"METRICS",def:"Post-interaction satisfaction score, typically 1–5 stars. Measured after customer service calls, app interactions, or specific feature use. More granular than NPS — tied to specific touchpoints.",why:"C1 PM context: Eno's CSAT after a virtual card creation or fraud alert is a direct feature metric. For Director-level answers: CSAT at the feature level + NPS at the product level = full satisfaction picture."},
  {term:"DAU / MAU",cat:"metrics",tag:"METRICS",def:"Daily Active Users / Monthly Active Users. The ratio (DAU/MAU) measures stickiness — how frequently monthly users return daily. Industry benchmark: >20% is strong for financial apps.",why:"C1 PM context: Capital One Mobile App, Eno, and Shopping all track DAU/MAU. A DAU/MAU drop without user loss signals engagement decline — classic DEC case prompt."},
  {term:"Average Transaction Amount (ATA)",cat:"metrics",tag:"METRICS",def:"The average dollar value of a single credit card transaction. Key metric for interchange revenue modeling. Formula: Total Spend ÷ Number of Transactions.",why:"C1 PM context: Used in financial cases — 'Average spend is $200/month' means ~10–15 transactions at an ATA of $13–20. Venture X cardholders have much higher ATA than entry-level cards."},
  {term:"Average Spend Per Cardholder",cat:"metrics",tag:"METRICS",def:"Total monthly/annual spend divided by active cardholders. A key revenue driver — interchange income scales directly with this number. Venture X target: $2,000+/month per cardholder.",why:"C1 PM context: Rewards programs, Shopping cashback, and travel features are all designed to increase average spend. Every 1% increase in average spend = direct interchange revenue uplift."},
  {term:"Activation Rate",cat:"metrics",tag:"METRICS",def:"The percentage of acquired customers or new feature users who complete a 'first key action' (first purchase, first Eno alert enabled, first virtual card created). Eno's activation rate is notably low at ~12%.",why:"C1 PM context: Low activation = awareness or UX friction problem. Always the first metric to check after a product launch. From your cases: tripling Eno activation from 12% → 36% is the Director-level target."},
  {term:"Retention Rate",cat:"metrics",tag:"METRICS",def:"The percentage of customers or users still active at a given time after acquisition. D7, D30, D90 (7-day, 30-day, 90-day) retention. Annual card retention = % renewing at fee anniversary.",why:"C1 PM context: Venture X's year-2 retention around the $395 fee date is the key PM challenge. CreditWise retention is strong (habit-forming). Shopping extension retention drops sharply after install."},
  {term:"Churn Rate",cat:"metrics",tag:"METRICS",def:"The percentage of customers who cancel or become inactive in a given period. Inverse of retention. Monthly churn = customers lost ÷ starting customers. Annual card churn is a critical P&L lever.",why:"C1 PM context: A 1% reduction in Venture X churn at $395/card = significant annual fee revenue retained. Always model churn impact when proposing retention features."},
  {term:"Customer Acquisition Cost (CAC)",cat:"metrics",tag:"METRICS",def:"Total marketing and sales cost to acquire one new customer. For credit cards: sign-up bonuses + marketing + underwriting cost. Venture X CAC is high due to 75K mile bonus (~$750 value).",why:"C1 PM context: Shopping and CreditWise are lower-CAC acquisition funnels vs. direct card marketing. If Shopping converts 1% of 10M users to C1 cards, and CAC via direct channel is $300, Shopping saves $30M/year in acquisition costs."},
  {term:"Customer Lifetime Value (CLV / LTV)",cat:"metrics",tag:"METRICS",def:"The total net revenue expected from a customer over their relationship with C1. Formula: Avg Annual Revenue per Customer × Retention Rate ÷ Churn Rate.",why:"C1 PM context: Director-level PMs justify features by CLV impact, not just near-term revenue. A feature that extends customer tenure by 6 months × avg annual revenue = quantified CLV improvement."},
  {term:"Conversion Rate",cat:"metrics",tag:"METRICS",def:"The percentage of users who complete a desired action (apply for card, pre-qualify, activate feature). Funnel-specific: install → activation, pre-qualify → loan origination, CreditWise user → card applicant.",why:"C1 PM context: Shopping's conversion rate (installs → C1 card applications) is the core strategic metric. Auto Navigator's pre-qualify → dealership visit conversion (currently ~60%) is a product gap."},
  {term:"Loan Origination Volume",cat:"metrics",tag:"METRICS",def:"The total dollar value of new loans funded in a period. For Auto Navigator: the total value of auto loans issued through the platform. Key revenue growth metric for lending products.",why:"C1 PM context: Auto Navigator's North Star metric. Every feature decision (pre-qual UX, dealer integration, payment calculator) should be traced back to: does this increase loan originations?"},

  // ── PRODUCT-SPECIFIC METRICS ──
  {term:"Credits (C1 Shopping)",cat:"shopping",tag:"SHOPPING",def:"Capital One Shopping's cashback currency. Earned when users shop through the extension with a linked C1 card. Redeemable for gift cards or statement credit. Not the same as miles/points.",why:"C1 PM context: Credits redemption rate is a key engagement metric for Shopping. Low redemption signals users don't understand the value prop — a UX/communications problem, not a product-market fit problem."},
  {term:"Savings Delivered",cat:"shopping",tag:"SHOPPING",def:"The total dollar amount of coupons, price drops, and cashback found for Shopping users. C1 Shopping's headline value metric and primary user-facing North Star.",why:"C1 PM context: 'C1 Shopping saved users $X billion' is the product's value story. On the PM side, Savings Delivered per MAU is a better North Star than raw install count — it measures actual value creation."},
  {term:"Price History / Price Drop Alert",cat:"shopping",tag:"SHOPPING",def:"C1 Shopping tracks price history for products and alerts users when prices drop. A key differentiator vs. basic coupon tools. Drives re-engagement after install.",why:"C1 PM context: Price drop alerts are the Shopping feature most likely to drive repeat engagement (retention). Consider this when asked about activation vs. retention trade-offs in Shopping product cases."},
  {term:"Virtual Card Number (VCN)",cat:"product",tag:"PRODUCT",def:"A unique, single-merchant credit card number generated by Eno. Protects the real card number. If the merchant is breached, only that VCN is compromised — not the real account.",why:"C1 PM context: Eno's most defensible differentiator. VCNs reduce CNP fraud, chargebacks, and disputes. Quantifiable value: disputes cost $15–50 each to process. If VCN prevents 500K disputes/year, that's $7.5M–25M in cost avoidance."},
  {term:"Score Simulator",cat:"product",tag:"PRODUCT",def:"CreditWise feature that lets users model 'what-if' scenarios: 'What happens to my score if I pay off $2,000 in debt?' Drives engagement and financial literacy.",why:"C1 PM context: Score Simulator is CreditWise's highest-engagement feature. Users who use it have higher retention and higher C1 card conversion. This is your evidence for why CreditWise should stay free — it's the top-of-funnel."},
  {term:"Dark Web Monitoring",cat:"product",tag:"PRODUCT",def:"CreditWise scans the dark web for a user's SSN, email, and personal data. Alerts them if found in a data breach. A differentiated feature vs. Credit Karma basic tier.",why:"C1 PM context: Dark Web Monitoring is CreditWise's Kano Delighter — unexpected, creates strong emotional value (safety), and is hard to replicate without infrastructure investment."},
  {term:"Pre-Qualification (Pre-Qual)",cat:"product",tag:"PRODUCT",def:"A soft-pull credit check that shows a customer their likely loan terms without impacting their credit score. Auto Navigator's key UX advantage — customers know their rate before stepping into a dealership.",why:"C1 PM context: Pre-qual is the top-of-funnel hook for Auto Navigator. The 40% pre-qual → dealership drop-off is the core product problem. What happens between pre-qual and dealership visit?"},
  {term:"Soft Pull vs. Hard Pull",cat:"credit",tag:"CREDIT",def:"Soft pull = credit inquiry that doesn't affect score (used for pre-qualification, CreditWise monitoring). Hard pull = full credit inquiry that shows on credit report (used for formal application). C1's competitive advantage is soft-pull pre-qual.",why:"C1 PM context: Auto Navigator's soft-pull pre-qual is a key differentiator — customers can shop rates without score impact. This is why the feature drives high funnel volume (low friction entry)."},
  {term:"Containment Rate",cat:"product",tag:"PRODUCT",def:"The percentage of customer service inquiries resolved by Eno (or the app/IVR) without requiring a human agent. High containment = lower operational cost.",why:"C1 PM context: Eno's containment rate is a key efficiency metric. Every 1% improvement in Eno containment reduces live agent calls. For a company with tens of millions of customers, this is a multi-million dollar metric."},

  // ── BANKING / FINANCIAL ──
  {term:"Demand Deposit Account (DDA)",cat:"banking",tag:"BANKING",def:"A standard checking or savings account where funds can be withdrawn at any time. Capital One 360 Checking and 360 Performance Savings are DDAs.",why:"C1 PM context: C1's banking products (360 Checking) are tightly integrated with the Mobile App. DDA customers have higher cross-product engagement than credit-card-only customers."},
  {term:"FDIC Insurance",cat:"banking",tag:"BANKING",def:"Federal Deposit Insurance Corporation insures bank deposits up to $250,000 per depositor. All Capital One deposit products are FDIC-insured.",why:"C1 PM context: A trust signal for any C1 banking product conversation. Fintech competitors (Chime, Wise) are not banks — their FDIC coverage is through partner banks. C1's direct FDIC status is a competitive advantage."},
  {term:"Fed Funds Rate",cat:"banking",tag:"BANKING",def:"The interest rate at which banks lend to each other overnight. Set by the Federal Reserve. Directly affects Capital One's cost of funds and the APRs it can offer.",why:"C1 PM context: Rising rates increase NIM (good for C1's interest income) but also increase customer default risk. Know that macro rate environment affects every credit product decision."},
  {term:"Zelle",cat:"banking",tag:"BANKING",def:"A real-time P2P payment network integrated into Capital One Mobile App. Allows instant transfers between bank accounts. A table-stakes feature for major banks.",why:"C1 PM context: Zelle is a Must-Be feature (Kano model) — its absence would be a competitive liability. Not a differentiator, but required. Contrast with Eno virtual cards, which are a Delighter."},
  {term:"ACH Transfer",cat:"banking",tag:"BANKING",def:"Automated Clearing House — the electronic network for bank-to-bank transfers. Standard for direct deposit, bill pay, and scheduled transfers. Settles in 1–3 business days vs. Zelle's real-time.",why:"C1 PM context: ACH is the backend for most recurring payment features. Faster settlement (same-day ACH) is a product improvement C1 offers on some accounts."},
  {term:"CFPB (Consumer Financial Protection Bureau)",cat:"banking",tag:"BANKING",def:"The federal regulator that oversees consumer financial products — credit cards, mortgages, auto loans. Enforces fair lending, truth-in-lending, and dispute resolution rules.",why:"C1 PM context: Any credit or payments feature must clear CFPB regulatory review. At Director level: mention regulatory constraints when discussing product decisions. 'We'd need to validate this with compliance and CFPB fair lending guidelines' signals seniority."},
  {term:"Fair Lending / ECOA",cat:"banking",tag:"BANKING",def:"Equal Credit Opportunity Act — prohibits discrimination in credit decisions based on race, gender, age, religion, etc. Credit algorithms (like Auto Navigator's pre-qual) must be tested for disparate impact.",why:"C1 PM context: Any ML-based credit feature must be audited for fair lending compliance. Mention this when discussing underwriting features — it signals you understand the regulatory guardrails of fintech PM work."},

  // ── STRATEGY / BUSINESS ──
  {term:"Co-Brand Card",cat:"strategy",tag:"STRATEGY",def:"A credit card issued jointly by C1 and a retail/airline/hotel partner (e.g., Walmart Credit Card by Capital One). Revenue and rewards are shared between C1 and the partner.",why:"C1 PM context: Co-brand economics are complex — partner gets a share of interchange and interchange-funded rewards. Evaluating a new co-brand partnership uses the MRT framework + partner economics analysis."},
  {term:"TAM / SAM / SOM",cat:"strategy",tag:"STRATEGY",def:"Total Addressable Market / Serviceable Addressable Market / Serviceable Obtainable Market. Used in market sizing. TAM = everyone, SAM = those C1 can reach, SOM = realistic capture in 3–5 years.",why:"C1 PM context: Use TAM/SAM/SOM to frame any new product opportunity. 'CreditWise TAM = 250M US adults. SAM = 100M interested in credit monitoring. SOM = 30M reachable via digital channels in 3 years.'"},
  {term:"CAC : LTV Ratio",cat:"strategy",tag:"STRATEGY",def:"The ratio of Customer Acquisition Cost to Lifetime Value. Healthy ratio: LTV ≥ 3× CAC. If CAC is $300 and LTV is $900, the ratio is 3:1 — borderline. Venture X sign-up bonus makes CAC high.",why:"C1 PM context: Shopping and CreditWise are valuable precisely because their CAC is near-zero (organic installs) while LTV (if converted to C1 card) is high. Frame this when discussing the strategic value of free products."},
  {term:"North Star Metric",cat:"strategy",tag:"STRATEGY",def:"The single most important metric that captures a product's core value delivery. CreditWise: credit score improvement. Shopping: savings delivered. Auto Navigator: loans originated. Mobile App: monthly engaged users.",why:"C1 PM context: In any 'how do you measure success' question, lead with the North Star before listing input metrics. Explain why it captures value — and what it excludes (guardrail metrics)."},
  {term:"Payback Period",cat:"strategy",tag:"STRATEGY",def:"How long it takes to recoup an investment. Formula: Investment ÷ Annual Profit. A $5M feature build that generates $2M/year in savings has a 2.5-year payback period.",why:"C1 PM context: Use payback period when making build-vs-buy-vs-partner decisions. 'This feature has a 2.5-year payback against a 5-year product horizon — I'd recommend building it.'"},
  {term:"Unit Economics",cat:"strategy",tag:"STRATEGY",def:"The per-customer or per-transaction profitability of a product. Revenue per unit − cost per unit = contribution margin per unit. Used to assess scalability.",why:"C1 PM context: Always compute unit economics before recommending a new credit feature. 'At $10 interchange per account per month and $3 fraud/servicing cost, unit margin is $7 — profitable at 500K accounts.'"},
  {term:"Embedded Finance",cat:"strategy",tag:"STRATEGY",def:"Financial products (credit, insurance, payments) integrated directly into non-financial platforms. Example: Auto Navigator embedded at dealership POS. Buy Now Pay Later integrated at checkout.",why:"C1 PM context: A key C1 growth vector. Auto Navigator at the dealership is embedded finance. Shopping credits at checkout is embedded finance. Use this lens when asked about C1's 5-year strategy."},
];

const INSIDER_TIPS = [
  {icon:"🔴",src:"CAPITAL ONE CAREERS · OFFICIAL",text:"<strong>There is no single right answer.</strong> C1 explicitly says cases are open-ended conversations. Your answer = a recommendation backed by evidence from your reasoning process. They want your logic as much as your conclusion."},
  {icon:"📐",src:"IGOTANOFFER · DIRECTOR-LEVEL GUIDE",text:"<strong>Framework before diving in — always.</strong> State your structure out loud: 'I'd like to approach this using a revenue-cost framework across three customer segments...' C1 interviewers evaluate HOW you think, not just the answer."},
  {icon:"🏦",src:"IGOTANOFFER · CAPITAL ONE PM GUIDE",text:"<strong>Capital One is a tech company that happens to do banking.</strong> Frame every decision through a tech-forward, data-driven, cloud-first lens. Saying 'as a tech-enabled financial platform' vs. 'as a bank' signals your mindset immediately."},
